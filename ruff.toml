# SAGE monorepo ruff configuration
# Applied to all packages from the repo root

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "ANN",  # flake8-annotations (type hints)
    "S",    # flake8-bandit (security)
    "RUF",  # ruff-specific rules
]
ignore = [
    "ANN101",  # missing type annotation for self
    "ANN102",  # missing type annotation for cls
    "S101",    # use of assert (fine in tests)
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN",   # tests don't need full type annotations
    "S",     # security checks too strict in test code
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[lint.isort]
known-first-party = ["sage_solver_core", "sage_solver_mcp", "sage_cloud"]

line-length = 100
target-version = "py311"
